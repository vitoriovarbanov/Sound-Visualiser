<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sound Visualiser</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>

  <body>
    <div class="player" id="player">
      <div class="top">
        <div class="head">
          <p class="label red">Sound Visualiser</p>
          <div class="head-right">
            <p class="label ink" id="src">Track 01 / 01</p>
            <button class="open" id="open">Open file</button>
            <input type="file" id="file" accept="audio/*" hidden />
          </div>
        </div>
        <h1 class="masthead" id="title">visualise<br />.mp3</h1>
      </div>

      <div class="foot">
        <button class="pp" id="pp" aria-label="Play" disabled>
          <svg class="i-play" viewBox="0 0 24 24"><path d="M8 5v14l11-7z" /></svg>
          <svg class="i-pause" viewBox="0 0 24 24">
            <rect x="6" y="5" width="4" height="14" />
            <rect x="14" y="5" width="4" height="14" />
          </svg>
        </button>
        <span class="time" id="cur">0:00</span>
        <div class="seek" id="seek">
          <span class="fill" id="fill"></span>
          <span class="knob" id="knob"></span>
        </div>
        <span class="time" id="tot">0:00</span>
      </div>
    </div>

    <div class="drop" id="drop"><span>Drop an audio file</span></div>

    <script type="importmap">
      { "imports": { "three": "./node_modules/three/build/three.module.js" } }
    </script>
    <script type="module" src="./js/3d.js"></script>
  </body>
</html>
